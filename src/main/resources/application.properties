spring.application.name=petweb

# Configurações do banco de dados
spring.datasource.url=jbdc:postgresql://localhost:5432/petweb_db
spring.datasource.username=postgres
spring.datasource.password=postdba

# Configurações do JPA/Hibernate
# Atualize as tabelas do banco de dados automaticamente
spring.jpa.hibernate.ddl-auto=update

# Exibir no terminal as consultas SQL geradas 
spring.jpa.show-sql=true

# Limpar o cache para a execução do Thymeleaf
spring.thymeleaf.cache=false

# Configurações do servidor
server.port=8080